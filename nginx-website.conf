server {
    listen 80;
    server_name nutrisofiamonroy.com www.nutrisofiamonroy.com;
    root /usr/share/nginx/html;
    index index.html;

    # ── WebView / in-app-browser compatibility headers ────────────────────────
    # X-Content-Type-Options: prevents MIME-type sniffing that can cause
    #   some WebViews to refuse loading resources.
    # X-Frame-Options: SAMEORIGIN allows same-origin framing (needed for some
    #   WebView contexts) while blocking third-party iframe embedding.
    # Referrer-Policy: limits referrer leakage without breaking navigation.
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Static links page — served directly without Angular bootstrap ─────────
    # Avoids the trailing-slash 301 redirect that try_files $uri $uri/ would
    # otherwise issue for /links (no file named "links" in root → nginx would
    # 301 to /links/ before finding links/index.html). TikTok's in-app browser
    # treats ANY redirect as a blocked navigation, so we short-circuit it here.
    location = /links {
        try_files /links/index.html /index.html;
    }

    location = /links/ {
        try_files /links/index.html /index.html;
    }

    # ── Angular SPA fallback for all other routes ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Cache static assets
    # Note: add_header inside a nested location block overrides the parent
    # block's add_header directives, so we repeat the security headers here.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control          "public, immutable";
        add_header X-Content-Type-Options "nosniff"                        always;
        add_header X-Frame-Options        "SAMEORIGIN"                     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
